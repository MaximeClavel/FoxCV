<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxCV - Salesforce Console</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="slds-scope">

    <!-- GLOBAL HEADER -->
    <div class="slds-global-header_container">
        <header class="slds-global-header slds-grid slds-grid_align-spread">
            <div class="slds-global-header__item">
                <div class="slds-global-header__logo" style="display:flex;align-items:center;gap:.75rem">
                    <span class="slds-app-name">FoxCV</span>
                </div>
            </div>
            <div class="slds-global-header__item slds-global-header__item_search">
                <div class="slds-form-element slds-lookup" style="margin:0">
                    <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left">
                        <svg class="slds-icon slds-input__icon slds-input__icon_left slds-icon-text-default" style="width:1rem;height:1rem;fill:#b0adab" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" id="globalSearch" class="slds-input" placeholder="Rechercher dans le CV..." autocomplete="off">
                    </div>
                </div>
            </div>
            <div class="slds-global-header__item">
                <ul class="slds-global-actions">
                    <li class="slds-global-actions__item">
                        <button class="darkmode-toggle" id="darkModeBtn" title="Basculer mode sombre / clair" aria-label="Toggle dark mode">
                            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z" fill="currentColor"/></svg>
                            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path d="M9.37 5.51A7.35 7.35 0 009.1 7.5c0 4.08 3.32 7.4 7.4 7.4.68 0 1.35-.09 1.99-.27A7.014 7.014 0 0112 19c-3.86 0-7-3.14-7-7 0-2.93 1.81-5.45 4.37-6.49zM12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" fill="currentColor"/></svg>
                        </button>
                    </li>
                    <li class="slds-global-actions__item">
                        <a href="https://www.linkedin.com/in/maxime-clavel-7603a3aa/" target="_blank" rel="noopener noreferrer" class="linkedin-btn" title="Voir le profil LinkedIn" aria-label="LinkedIn">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 3a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14m-.5 15.5v-5.3a3.26 3.26 0 00-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 011.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 001.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 00-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                        </a>
                    </li>
                    <li class="slds-global-actions__item">
                        <span class="slds-avatar slds-avatar_circle slds-avatar_medium" style="width:2rem;height:2rem;overflow:hidden">
                            <img src="assets/img/profile.png" alt="Maxime CLAVEL" style="width:100%;height:100%;object-fit:cover;border-radius:50%">
                        </span>
                    </li>
                </ul>
            </div>
        </header>
    </div>

    <!-- CONTEXT BAR / NAVIGATION -->
    <div class="slds-context-bar">
        <div class="slds-context-bar__primary">
            <div class="slds-context-bar__item slds-context-bar__dropdown-trigger slds-dropdown-trigger slds-dropdown-trigger_click slds-no-hover">
                <button class="slds-button slds-button_icon app-launcher-trigger context-bar-launcher" title="App Launcher" aria-label="App Launcher">
                    <svg viewBox="0 0 52 52" width="22" height="22">
                        <rect x="2" y="2" rx="3" width="12" height="12" fill="currentColor"/><rect x="20" y="2" rx="3" width="12" height="12" fill="currentColor"/>
                        <rect x="38" y="2" rx="3" width="12" height="12" fill="currentColor"/><rect x="2" y="20" rx="3" width="12" height="12" fill="currentColor"/>
                        <rect x="20" y="20" rx="3" width="12" height="12" fill="currentColor"/><rect x="38" y="20" rx="3" width="12" height="12" fill="currentColor"/>
                        <rect x="2" y="38" rx="3" width="12" height="12" fill="currentColor"/><rect x="20" y="38" rx="3" width="12" height="12" fill="currentColor"/>
                        <rect x="38" y="38" rx="3" width="12" height="12" fill="currentColor"/>
                    </svg>
                </button>
                <span class="slds-context-bar__app-name">
                    <span class="slds-truncate" title="FoxCV">FoxCV</span>
                </span>
            </div>
        </div>
        <nav class="slds-context-bar__secondary" role="navigation">
            <ul class="slds-grid" role="tablist">
                <li class="slds-context-bar__item slds-is-active" data-tab="home" role="tab">
                    <a class="slds-context-bar__label-action" title="Accueil"><span class="slds-truncate">Accueil</span></a>
                </li>
                <li class="slds-context-bar__item" data-tab="profile" role="tab">
                    <a class="slds-context-bar__label-action" title="Profil"><span class="slds-truncate">Profil</span></a>
                </li>
                <li class="slds-context-bar__item" data-tab="experience" role="tab">
                    <a class="slds-context-bar__label-action" title="Expériences"><span class="slds-truncate">Expériences</span></a>
                </li>
                <li class="slds-context-bar__item" data-tab="skills" role="tab">
                    <a class="slds-context-bar__label-action" title="Compétences"><span class="slds-truncate">Compétences</span></a>
                </li>
                <li class="slds-context-bar__item" data-tab="certifications" role="tab">
                    <a class="slds-context-bar__label-action" title="Certifications"><span class="slds-truncate">Certifications</span></a>
                </li>
                <li class="slds-context-bar__item" data-tab="projects" role="tab">
                    <a class="slds-context-bar__label-action" title="Projets"><span class="slds-truncate">Projets</span></a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="slds-page-main">
        <section class="tab-content slds-is-active" id="tab-home"></section>
        <section class="tab-content" id="tab-profile"></section>
        <section class="tab-content" id="tab-experience"></section>
        <section class="tab-content" id="tab-skills"></section>
        <section class="tab-content" id="tab-certifications"></section>
        <section class="tab-content" id="tab-projects"></section>
    </div>

    <!-- UTILITY BAR -->
    <div class="slds-utility-bar_container slds-is-fixed">
        <footer class="slds-utility-bar" aria-label="Utility Bar">
            <ul class="slds-utility-bar__body">
                <li class="slds-utility-bar__item">
                    <button class="slds-utility-bar__action">
                        <svg class="slds-utility-bar__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" fill="currentColor"/></svg>
                        <span class="slds-utility-bar__text">Disponible</span>
                    </button>
                </li>
                <li class="slds-utility-bar__item">
                    <a href="mailto:maximeclavel34@gmail.com" class="slds-utility-bar__action" style="text-decoration:none">
                        <svg class="slds-utility-bar__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                        <span class="slds-utility-bar__text">Contact</span>
                    </a>
                </li>
                <li class="slds-utility-bar__item">
                    <button class="slds-utility-bar__action" onclick="switchTab('certifications')">
                        <svg class="slds-utility-bar__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm-1 15l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z" fill="currentColor"/></svg>
                        <span class="slds-utility-bar__text">2 Certifications</span>
                    </button>
                </li>
            </ul>
        </footer>
    </div>

    </div><!-- /.slds-scope -->
    <script src="js/app.js"></script>
</body>
</html>
